<!DOCTYPE html>
<html lang="tr" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>İzle — GenSub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/tailwind.css?v=7">
</head>
<body class="min-h-screen bg-neutral-950">
  <header class="sticky top-0 z-50 border-b border-neutral-800 bg-neutral-950/90 backdrop-blur-xl">
    <div class="mx-auto flex max-w-5xl items-center gap-3 px-4 py-3 sm:px-6 lg:px-8">
      <a href="/" class="inline-flex shrink-0 items-center gap-1.5 rounded-lg border border-neutral-800 px-3 py-2 text-xs font-medium text-neutral-400 transition hover:border-neutral-700 hover:text-emerald-400">
        <svg class="size-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5 8.25 12l7.5-7.5" />
        </svg>
        Kütüphane
      </a>
      <div class="min-w-0 flex-1">
        <h1 class="truncate text-lg font-semibold text-neutral-100 sm:text-xl" id="episode-title">Yükleniyor…</h1>
        <p class="truncate text-xs text-neutral-500" id="episode-status"></p>
      </div>
      <button type="button" id="rebuild-btn" class="inline-flex shrink-0 items-center gap-x-1.5 rounded-lg border border-emerald-500/40 bg-emerald-500/10 px-3 py-2 text-xs font-medium text-emerald-400 transition hover:bg-emerald-500/20">
        Yeniden oluştur
      </button>
    </div>
  </header>

  <main class="mx-auto max-w-5xl px-4 py-6 sm:px-6 lg:px-8 lg:py-8">
    <!-- İşlem devam ediyor -->
    <div id="processing-panel" class="mx-auto max-w-lg rounded-xl border border-neutral-800 bg-neutral-900/80 p-8 text-center" hidden>
      <div id="processing-spinner" class="mx-auto mb-5 size-12 animate-spin rounded-full border-2 border-neutral-800 border-t-emerald-400" aria-hidden="true"></div>
      <h2 class="font-mono text-sm font-semibold tracking-widest text-emerald-400 uppercase" id="processing-title">Hazırlanıyor</h2>
      <p class="mt-3 text-sm leading-relaxed text-neutral-400" id="processing-message">…</p>
      <div id="processing-progress-wrap" class="mt-6 h-2 overflow-hidden rounded-full bg-neutral-800">
        <div id="processing-bar" class="h-full rounded-full bg-emerald-500 transition-[width] duration-300" style="width:0%"></div>
      </div>
    </div>

    <!-- Video oynatıcı -->
    <div id="player-panel" class="space-y-4" hidden>
      <div class="overflow-hidden rounded-xl border border-neutral-800 bg-black shadow-[0_0_40px_rgba(16,185,129,0.06)]">
        <video
          id="player"
          class="mx-auto block w-full max-h-[min(70vh,720px)] bg-black object-contain"
          controls
          preload="auto"
          crossorigin="anonymous"
          playsinline
        >
          <track kind="subtitles" src="" srclang="tr" label="Türkçe" default>
          Tarayıcınız video oynatmayı desteklemiyor.
        </video>
      </div>
      <div class="flex flex-wrap items-center justify-between gap-3">
        <div class="flex items-center gap-2">
          <button type="button" id="subtitle-toggle" class="inline-flex items-center gap-x-1.5 rounded-lg border border-neutral-800 bg-neutral-900 px-3 py-2 text-xs font-medium text-neutral-300 transition hover:border-neutral-700 hover:bg-neutral-800" aria-pressed="true">
            Altyazı
          </button>
        </div>
        <p class="font-mono text-xs text-neutral-600" id="video-meta"></p>
      </div>
    </div>

    <!-- Henüz hazır değil -->
    <div id="idle-panel" class="mx-auto max-w-lg rounded-xl border border-neutral-800 bg-neutral-900/80 p-8 text-center" hidden>
      <div class="mx-auto mb-4 flex size-12 items-center justify-center rounded-full border border-neutral-700 bg-neutral-800/50 text-neutral-400">
        <svg class="size-6" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" d="m15.75 10.5 4.72-4.72a.75.75 0 0 1 1.28.53v11.38a.75.75 0 0 1-1.28.53l-4.72-4.72M4.5 18.75h9a2.25 2.25 0 0 0 2.25-2.25v-9a2.25 2.25 0 0 0-2.25-2.25h-9A2.25 2.25 0 0 0 2.25 7.5v9a2.25 2.25 0 0 0 2.25 2.25Z" />
        </svg>
      </div>
      <h2 class="text-lg font-semibold text-neutral-100">Henüz hazır değil</h2>
      <p class="mt-2 text-sm leading-relaxed text-neutral-400">Altyazıyı oluşturmak için ana listeden <strong class="font-medium text-emerald-400">Hazırla</strong> butonuna tıklayın.</p>
      <a href="/" class="mt-6 inline-flex items-center justify-center rounded-lg bg-emerald-500 px-4 py-2.5 text-sm font-semibold text-neutral-950 transition hover:bg-emerald-400">Kütüphaneye dön</a>
    </div>

    <!-- Hata -->
    <div id="error-panel" class="mx-auto max-w-lg rounded-xl border border-red-500/30 bg-red-500/5 p-8 text-center" hidden>
      <p class="font-mono text-xs tracking-widest text-red-400 uppercase">Hata</p>
      <h2 class="mt-2 text-lg font-semibold text-neutral-100">İşlem başarısız</h2>
      <p class="mt-3 text-sm leading-relaxed text-neutral-400" id="error-message"></p>
      <button type="button" id="retry-btn" class="mt-6 inline-flex items-center justify-center rounded-lg bg-emerald-500 px-4 py-2.5 text-sm font-semibold text-neutral-950 transition hover:bg-emerald-400">Tekrar dene</button>
    </div>
  </main>

  <script src="/static/watch.js?v=3"></script>
</body>
</html>
